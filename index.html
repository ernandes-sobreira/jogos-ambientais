<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogos Ambientais 🌍 — Plataforma Educacional</title>
<style>
:root{--bg1:#06281e;--bg2:#14532d;--accent:#a3e635;--accent2:#65a30d;--card:rgba(255,255,255,.09);--text:#0f2417}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",system-ui,sans-serif;min-height:100vh;color:#fff;
  background:linear-gradient(160deg,var(--bg1),var(--bg2));display:flex;flex-direction:column;align-items:center;padding:24px 16px}
header{text-align:center;max-width:920px;margin-bottom:10px}
h1{font-size:clamp(1.7rem,5vw,2.6rem)}
h1 span{color:var(--accent)}
.sub{opacity:.85;margin-top:6px;font-size:1rem;line-height:1.4}
.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0}
.stat{background:rgba(255,255,255,.08);border-radius:10px;padding:8px 18px;font-size:.85rem;text-align:center}
.stat strong{color:var(--accent);font-size:1.25rem;display:block}
.tabs{display:flex;gap:8px;margin:16px 0 10px;flex-wrap:wrap;justify-content:center}
.tab{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:24px;
  padding:8px 22px;cursor:pointer;font-size:.9rem;transition:.2s;color:#fff}
.tab:hover{background:rgba(255,255,255,.2)}
.tab.active{background:var(--accent);color:var(--text);font-weight:700;border-color:transparent}
.filters{width:min(920px,96vw);margin-bottom:14px;display:none;flex-wrap:wrap;gap:7px;justify-content:center}
.filters.visible{display:flex}
.flabel{opacity:.6;font-size:.78rem;align-self:center;margin-right:4px}
.chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:20px;
  padding:5px 14px;cursor:pointer;font-size:.82rem;transition:.2s;color:rgba(255,255,255,.85)}
.chip:hover{background:rgba(255,255,255,.22)}
.chip.active{background:var(--accent);color:var(--text);font-weight:700;border-color:transparent}
.today{width:min(920px,96vw);margin-bottom:8px;background:linear-gradient(145deg,var(--accent),var(--accent2));
  color:var(--text);border-radius:16px;padding:20px;text-decoration:none;display:none;
  box-shadow:0 8px 24px rgba(0,0,0,.35);transition:.2s}
.today:hover{transform:translateY(-3px)}
.today .tag{font-size:.75rem;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.today h2{font-size:1.5rem;margin:4px 0}
.today p{font-size:.92rem;opacity:.9}
.wrap{width:min(920px,96vw)}
.sec-title{font-size:1rem;opacity:.7;margin:22px 0 10px;text-transform:capitalize;font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.game{background:var(--card);border:1px solid rgba(255,255,255,.15);border-radius:12px;
  padding:14px;color:#fff;text-decoration:none;transition:.2s;display:block}
.game:hover{background:rgba(255,255,255,.18);transform:translateY(-2px)}
.game .date{font-size:.72rem;opacity:.6}
.game h4{font-size:1rem;margin:3px 0;color:var(--accent)}
.game .meta{font-size:.78rem;opacity:.75;line-height:1.35}
.badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.badge{font-size:.66rem;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
.badge.disc{background:rgba(163,230,53,.18);color:#b8f55a}
.badge.biome{background:rgba(100,200,255,.15);color:#7dd3fc}
.empty{margin-top:30px;opacity:.7;text-align:center}
footer{margin-top:40px;opacity:.8;font-size:.85rem;text-align:center;line-height:1.6}
footer .credit{font-weight:700;opacity:1}
</style>
</head>
<body>
<header>
  <h1>🌍 Jogos <span>Ambientais</span></h1>
  <p class="sub">Plataforma educacional interativa — explore clima, biomas, biodiversidade e ciência ambiental.<br>
  Jogos por disciplina escolar e por bioma · Forme um <strong>🛰️ Carbonauta</strong>!</p>
</header>

<div class="stats" id="stats"></div>

<div class="tabs">
  <button class="tab active" onclick="setView('date')">📅 Por Data</button>
  <button class="tab" onclick="setView('disc')">📚 Por Disciplina</button>
  <button class="tab" onclick="setView('biome')">🌿 Por Bioma</button>
</div>

<div class="filters" id="filterDisc"></div>
<div class="filters" id="filterBiome"></div>

<a class="today" id="todayCard"></a>
<div class="wrap" id="content"></div>
<p class="empty" id="empty" style="display:none">Os jogos aparecem aqui em breve…</p>

<footer>
  Novos jogos todos os dias às 6h ·
  <span class="credit">— Idealizado por Ernandes Sobreira —</span>
</footer>

<script>
const MESES=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const DISC_LABELS={
  biologia:'Biologia 🧬',quimica:'Química ⚗️',fisica:'Física ⚡',matematica:'Matemática 📐',
  geografia:'Geografia 🗺️',historia:'História 📜',sociologia:'Sociologia 🤝',filosofia:'Filosofia 🤔',
  portugues:'Português 📝',ingles:'Inglês 🇬🇧',espanhol:'Espanhol 🇪🇸',arte:'Arte 🎨',
  'educacao-fisica':'Ed. Física 🏃','ensino-religioso':'Ens. Religioso 🌱',ciencias:'Ciências 🔬'
};
const BIOME_LABELS={
  pantanal:'Pantanal 🐊',amazonia:'Amazônia 🌳',cerrado:'Cerrado 🌿',
  caatinga:'Caatinga 🌵','mata-atlantica':'Mata Atlântica 🦋',global:'Global 🌍'
};

let allGames=[],view='date',activeDisc=null,activeBiome=null;

function fmt(d){const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`;}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

function setView(v){
  view=v;activeDisc=null;activeBiome=null;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['date','disc','biome'][i]===v));
  document.getElementById('filterDisc').classList.toggle('visible',v==='disc');
  document.getElementById('filterBiome').classList.toggle('visible',v==='biome');
  document.getElementById('todayCard').style.display=v==='date'?'block':'none';
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  render();
}
window.setView=setView;

function setFilter(type,key){
  if(type==='disc'){activeDisc=activeDisc===key?null:key;}
  else{activeBiome=activeBiome===key?null:key;}
  const fid='#filter'+(type==='disc'?'Disc':'Biome');
  document.querySelectorAll(fid+' .chip').forEach(c=>{
    const k=type==='disc'?activeDisc:activeBiome;
    c.classList.toggle('active',c.dataset.key===k);
  });
  render();
}
window.setFilter=setFilter;

function buildFilters(games){
  const discs=new Set(),biomes=new Set();
  games.forEach(g=>{(g.disciplines||[]).forEach(d=>discs.add(d));(g.biomes||[]).forEach(b=>biomes.add(b));});
  const dEl=document.getElementById('filterDisc');
  dEl.innerHTML='<span class="flabel">Disciplina:</span>';
  [...discs].sort().forEach(d=>{
    const c=document.createElement('button');c.className='chip';c.dataset.key=d;
    c.textContent=DISC_LABELS[d]||d;c.onclick=()=>setFilter('disc',d);dEl.appendChild(c);
  });
  const bEl=document.getElementById('filterBiome');
  bEl.innerHTML='<span class="flabel">Bioma:</span>';
  const biomeOrder=['pantanal','amazonia','cerrado','caatinga','mata-atlantica','global'];
  const sortedBiomes=[...biomeOrder.filter(b=>biomes.has(b)),...[...biomes].filter(b=>!biomeOrder.includes(b)).sort()];
  sortedBiomes.forEach(b=>{
    const c=document.createElement('button');c.className='chip';c.dataset.key=b;
    c.textContent=BIOME_LABELS[b]||b;c.onclick=()=>setFilter('biome',b);bEl.appendChild(c);
  });
}

function gameCard(g){
  const a=document.createElement('a');a.className='game';a.href=g.file;
  const discBadges=(g.disciplines||[]).map(d=>`<span class="badge disc">${esc(DISC_LABELS[d]||d)}</span>`).join('');
  const biomeBadges=(g.biomes||[]).map(b=>`<span class="badge biome">${esc(BIOME_LABELS[b]||b)}</span>`).join('');
  a.innerHTML=`<div class="date">${fmt(g.date)}</div><h4>${esc(g.name)}</h4>
    <div class="meta">${esc(g.theme)}<br>${esc(g.genre)}</div>
    ${discBadges||biomeBadges?`<div class="badges">${discBadges}${biomeBadges}</div>`:''}`;
  return a;
}

function render(){
  let games=[...allGames];
  if(view==='disc'&&activeDisc) games=games.filter(g=>(g.disciplines||[]).includes(activeDisc));
  else if(view==='biome'&&activeBiome) games=games.filter(g=>(g.biomes||[]).includes(activeBiome));
  games.sort((a,b)=>b.date.localeCompare(a.date));
  const wrap=document.getElementById('content');wrap.innerHTML='';
  if(!games.length){wrap.innerHTML='<p class="empty" style="display:block">Nenhum jogo encontrado para este filtro.</p>';return;}

  if(view==='date'){
    const byMonth={};
    games.forEach(g=>{const k=g.date.slice(0,7);(byMonth[k]=byMonth[k]||[]).push(g);});
    Object.keys(byMonth).sort().reverse().forEach(k=>{
      const[y,m]=k.split('-');
      const sec=document.createElement('div');
      sec.innerHTML=`<p class="sec-title">${MESES[+m-1]} de ${y}</p>`;
      const grid=document.createElement('div');grid.className='grid';
      byMonth[k].forEach(g=>grid.appendChild(gameCard(g)));
      sec.appendChild(grid);wrap.appendChild(sec);
    });
  } else if(view==='disc'){
    if(!activeDisc){
      const byDisc={};
      games.forEach(g=>{const ds=g.disciplines&&g.disciplines.length?g.disciplines:['geral'];ds.forEach(d=>{(byDisc[d]=byDisc[d]||[]).push(g);});});
      Object.keys(byDisc).sort().forEach(d=>{
        const sec=document.createElement('div');
        sec.innerHTML=`<p class="sec-title">${esc(DISC_LABELS[d]||d)}</p>`;
        const grid=document.createElement('div');grid.className='grid';
        byDisc[d].forEach(g=>grid.appendChild(gameCard(g)));
        sec.appendChild(grid);wrap.appendChild(sec);
      });
    } else {
      const grid=document.createElement('div');grid.className='grid';
      games.forEach(g=>grid.appendChild(gameCard(g)));wrap.appendChild(grid);
    }
  } else {
    if(!activeBiome){
      const byBiome={};
      games.forEach(g=>{const bs=g.biomes&&g.biomes.length?g.biomes:['global'];bs.forEach(b=>{(byBiome[b]=byBiome[b]||[]).push(g);});});
      const biomeOrder=['pantanal','amazonia','cerrado','caatinga','mata-atlantica','global'];
      const keys=[...biomeOrder.filter(b=>byBiome[b]),...Object.keys(byBiome).filter(b=>!biomeOrder.includes(b)).sort()];
      keys.forEach(b=>{
        const sec=document.createElement('div');
        sec.innerHTML=`<p class="sec-title">${esc(BIOME_LABELS[b]||b)}</p>`;
        const grid=document.createElement('div');grid.className='grid';
        byBiome[b].forEach(g=>grid.appendChild(gameCard(g)));
        sec.appendChild(grid);wrap.appendChild(sec);
      });
    } else {
      const grid=document.createElement('div');grid.className='grid';
      games.forEach(g=>grid.appendChild(gameCard(g)));wrap.appendChild(grid);
    }
  }
}

fetch('games.json?'+Date.now()).then(r=>r.json()).then(games=>{
  if(!games.length){document.getElementById('empty').style.display='block';return;}
  allGames=games;
  const discs=new Set(),biomes=new Set();
  games.forEach(g=>{(g.disciplines||[]).forEach(d=>discs.add(d));(g.biomes||[]).forEach(b=>biomes.add(b));});
  document.getElementById('stats').innerHTML=`
    <div class="stat"><strong>${games.length}</strong>jogos</div>
    <div class="stat"><strong>${discs.size}</strong>disciplinas</div>
    <div class="stat"><strong>${biomes.size}</strong>biomas</div>`;
  buildFilters(games);
  const sorted=[...games].sort((a,b)=>b.date.localeCompare(a.date));
  const todayStr=new Date().toISOString().slice(0,10);
  const todayGame=games.find(g=>g.date===todayStr);
  const featured=todayGame||sorted[0];
  const isToday=!!todayGame;
  const t=document.getElementById('todayCard');
  t.href=featured.file;t.style.display='block';
  t.innerHTML=`<span class="tag">${isToday?'🎮 Jogo de Hoje · '+fmt(featured.date):'🔥 Jogo mais recente · '+fmt(featured.date)}</span>
    <h2>${esc(featured.name)}</h2>
    <p>${esc(featured.theme)} · ${esc(featured.genre)} — jogar agora →</p>`;
  render();
}).catch(()=>{document.getElementById('empty').style.display='block';});
</script>
</body>
</html>
