<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogos Ambientais 🌍 — um jogo novo por dia</title>
<style>
  :root{--bg1:#06281e;--bg2:#14532d;--accent:#a3e635;--accent2:#65a30d;--card:rgba(255,255,255,.09);--text:#0f2417}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,sans-serif;min-height:100vh;color:#fff;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));display:flex;flex-direction:column;align-items:center;padding:24px 16px}
  header{text-align:center;max-width:760px;margin-bottom:10px}
  h1{font-size:clamp(1.7rem,5vw,2.6rem)}
  h1 span{color:var(--accent)}
  .sub{opacity:.85;margin-top:6px;font-size:1rem;line-height:1.4}
  .today{width:min(760px,96vw);margin-top:18px;background:linear-gradient(145deg,var(--accent),var(--accent2));
    color:var(--text);border-radius:16px;padding:20px;text-decoration:none;display:block;box-shadow:0 8px 24px rgba(0,0,0,.35);transition:.2s}
  .today:hover{transform:translateY(-3px)}
  .today .tag{font-size:.75rem;font-weight:800;letter-spacing:1px;text-transform:uppercase}
  .today h2{font-size:1.5rem;margin:4px 0}
  .today p{font-size:.92rem;opacity:.9}
  .month{width:min(760px,96vw);margin-top:26px}
  .month h3{font-size:1rem;opacity:.8;margin-bottom:10px;text-transform:capitalize}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .game{background:var(--card);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:14px;
    color:#fff;text-decoration:none;transition:.2s;display:block}
  .game:hover{background:rgba(255,255,255,.18);transform:translateY(-2px)}
  .game .date{font-size:.72rem;opacity:.65}
  .game h4{font-size:1.02rem;margin:3px 0;color:var(--accent)}
  .game .meta{font-size:.78rem;opacity:.8;line-height:1.3}
  .empty{margin-top:30px;opacity:.7}
  footer{margin-top:36px;opacity:.8;font-size:.85rem;text-align:center;line-height:1.6}
  footer .credit{font-weight:700;opacity:1}
</style>
</head>
<body>
<header>
  <h1>🌍 Jogos <span>Ambientais</span></h1>
  <p class="sub">Um jogo educativo novo todos os dias — clima, biomas, água, carbono e muito mais.<br>
  Três níveis de desafio e ranking global em cada jogo. Escolha o seu e bom jogo! 🎮</p>
</header>

<a class="today" id="todayCard" style="display:none"></a>
<div id="months"></div>
<p class="empty" id="empty" style="display:none">Os jogos aparecem aqui em breve…</p>

<footer>
  Novos jogos todos os dias às 7h ·
  <span class="credit">— Idealizado por Ernandes Sobreira —</span>
</footer>

<script>
const MESES=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
fetch('games.json?'+Date.now()).then(r=>r.json()).then(games=>{
  if(!games.length){document.getElementById('empty').style.display='block';return;}
  games.sort((a,b)=>b.date.localeCompare(a.date));
  const [latest,...rest]=games;
  const t=document.getElementById('todayCard');
  t.href=latest.file;t.style.display='block';
  t.innerHTML=`<span class="tag">🔥 Jogo mais recente · ${fmt(latest.date)}</span>
    <h2>${esc(latest.name)}</h2>
    <p>${esc(latest.theme)} · ${esc(latest.genre)} — jogar agora →</p>`;
  const byMonth={};
  rest.forEach(g=>{const k=g.date.slice(0,7);(byMonth[k]=byMonth[k]||[]).push(g);});
  const wrap=document.getElementById('months');
  Object.keys(byMonth).sort().reverse().forEach(k=>{
    const [y,m]=k.split('-');
    const sec=document.createElement('div');sec.className='month';
    sec.innerHTML=`<h3>${MESES[+m-1]} de ${y}</h3>`;
    const grid=document.createElement('div');grid.className='grid';
    byMonth[k].forEach(g=>{
      const a=document.createElement('a');a.className='game';a.href=g.file;
      a.innerHTML=`<div class="date">${fmt(g.date)}</div><h4>${esc(g.name)}</h4>
        <div class="meta">${esc(g.theme)}<br>${esc(g.genre)}</div>`;
      grid.appendChild(a);
    });
    sec.appendChild(grid);wrap.appendChild(sec);
  });
}).catch(()=>{document.getElementById('empty').style.display='block';});
function fmt(d){const[y,m,dd]=d.split('-');return `${dd}/${m}/${y}`;}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
</script>
</body>
</html>
